apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
# Install KServe in kubeflow namespace
- kserve_kubeflow.yaml
# Note: kserve-cluster-resources.yaml removed (uses namespace: kserve, not kubeflow)

patches:
# Delete the kserve-localmodelnode-agent DaemonSet
# Runs as privileged: true with hostPID: true and hostNetwork: true
- patch: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: kserve-localmodelnode-agent
      namespace: kubeflow
    $patch: delete

# Add seccompProfile: RuntimeDefault and disable Istio sidecar injection
- patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kserve-controller-manager
      namespace: kubeflow
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

# Add seccompProfile: RuntimeDefault and disable Istio sidecar injection
- patch: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: kserve-localmodel-controller-manager
      namespace: kubeflow
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

# Delete kserve-config-llm-router-route - template syntax in path fails CRD validation
- patch: |
    apiVersion: serving.kserve.io/v1alpha1
    kind: LLMInferenceServiceConfig
    metadata:
      name: kserve-config-llm-router-route
      namespace: kubeflow
    $patch: delete

# Delete the ValidatingWebhookConfiguration for LLM resources
# Webhook server (llmisvc-webhook-server-service) is not running — EOF errors
- patch: |
    apiVersion: admissionregistration.k8s.io/v1
    kind: ValidatingWebhookConfiguration
    metadata:
      name: llminferenceserviceconfig.serving.kserve.io
    $patch: delete

# Enable path-based routing via pathTemplate on the inferenceservice-config ConfigMap.
# This allows KServe to auto-generate VirtualServices for path-based URLs
# (/serving/<namespace>/<name>/...), eliminating manual VirtualService creation.
# Ref: https://github.com/kserve/kserve/issues/2257
# Ref: https://github.com/kserve/kserve/blob/master/config/configmap/inferenceservice.yaml#L389
- patch: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: inferenceservice-config
      namespace: kubeflow
    data:
      ingress: |-
        {
          "enableGatewayApi": false,
          "kserveIngressGateway": "kserve/kserve-ingress-gateway",
          "ingressGateway": "kubeflow/kubeflow-gateway",
          "localGateway": "knative-serving/knative-local-gateway",
          "localGatewayService": "knative-local-gateway.istio-system.svc.cluster.local",
          "ingressDomain": "example.com",
          "ingressClassName": "istio",
          "domainTemplate": "{{ .Name }}-{{ .Namespace }}.{{ .IngressDomain }}",
          "urlScheme": "http",
          "disableIstioVirtualHost": false,
          "disableIngressCreation": false,
          "pathTemplate": "/serving/{{ .Namespace }}/{{ .Name }}"
        }
      storageInitializer: |-
        {
          "image": "ghcr.io/thuanpham582002/storage-initializer:master-ee4d115",
          "memoryRequest": "100Mi",
          "memoryLimit": "2Gi",
          "cpuRequest": "100m",
          "cpuLimit": "1",
          "caBundleConfigMapName": "",
          "caBundleVolumeMountPath": "/etc/ssl/custom-certs",
          "enableModelcar": true,
          "cpuModelcar": "10m",
          "memoryModelcar": "15Mi",
          "uidModelcar": 0
        }

# Add USER env var, fsGroup, and SYS_PTRACE for modelcar /proc access (ptrace_scope=1)
- patch: |
    - op: add
      path: /spec/template/containers/0/env/-
      value:
        name: USER
        value: vllm
    - op: add
      path: /spec/template/securityContext
      value:
        fsGroup: 1010
    - op: replace
      path: /spec/template/containers/0/securityContext
      value:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        runAsNonRoot: false
        runAsUser: 0
        seccompProfile:
          type: RuntimeDefault
  target:
    kind: LLMInferenceServiceConfig
    name: kserve-config-llm-template
    namespace: kubeflow
